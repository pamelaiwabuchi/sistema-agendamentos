<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Agendamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Agendamento de Horário</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1 text-gray-700">Nome:</label>
                <input type="text" id="nome" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 text-gray-700">E-mail:</label>
                <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 text-gray-700">Profissional:</label>
                <select id="profissional" onchange="buscarHorarios()" class="w-full p-2 border border-gray-300 rounded outline-none"></select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1 text-gray-700">Data do Atendimento:</label>
                <input type="date" id="data" onchange="buscarHorarios()" class="w-full p-2 border border-gray-300 rounded outline-none">
            </div>
        </div>

        <div class="mt-4">
            <label class="block text-sm font-bold mb-2 text-gray-700">Horários Disponíveis:</label>
            <div id="grade" class="grid grid-cols-3 gap-2"></div>
        </div>

        <button onclick="enviar()" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded transition duration-200">
            Confirmar Agendamento
        </button>
        
        <div id="mensagem" class="mt-4 p-4 rounded hidden text-center font-bold"></div>
    </div>

    <script>
        let horaSel = null;
        const API = 'http://localhost:5001';

        async function carregar() {
            const res = await fetch(`${API}/profissionais`);
            const dados = await res.json();
            const sel = document.getElementById('profissional');
            sel.innerHTML = '<option value="">Selecione...</option>';
            dados.forEach(p => sel.innerHTML += `<option value="${p.prof_id}">${p.prof_nome} (${p.prof_especialidade})</option>`);
        }

        async function buscarHorarios() {
            const prof = document.getElementById('profissional').value;
            const data = document.getElementById('data').value;
            if(!prof || !data) return;
            const res = await fetch(`${API}/horarios-ocupados?profissional_id=${prof}&data=${data}`);
            const ocupados = await res.json();
            const grade = document.getElementById('grade');
            grade.innerHTML = '';
            ["13:00:00", "14:00:00", "15:00:00"].forEach(h => {
                const btn = document.createElement('button');
                btn.className = 'p-2 border border-blue-500 text-blue-600 rounded font-bold hover:bg-blue-600 hover:text-white transition';
                btn.textContent = h.substring(0, 5);
                if(ocupados.includes(h)) {
                    btn.disabled = true;
                    btn.className = 'p-2 bg-gray-200 text-gray-400 border border-gray-300 rounded line-through cursor-not-allowed';
                } else {
                    btn.onclick = () => { 
                        horaSel = h; 
                        document.querySelectorAll('.grid button').forEach(b => b.classList.remove('bg-blue-700', 'text-white')); 
                        btn.classList.add('bg-blue-700', 'text-white'); 
                    };
                }
                grade.appendChild(btn);
            });
        }

        async function enviar() {
            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                profissional_id: document.getElementById('profissional').value,
                data_hora: `${document.getElementById('data').value} ${horaSel}`
            };
            if(!payload.nome || !payload.email || !horaSel) return alert("Preencha tudo!");
            const res = await fetch(`${API}/agendar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            const data = await res.json();
            const msg = document.getElementById('mensagem');
            if(res.status === 201) {
                msg.className = "mt-4 p-4 rounded text-center font-bold bg-green-100 text-green-800 block";
                msg.innerHTML = `Confirmado!<br>${payload.nome}<br>${payload.data_hora}`;
                buscarHorarios();
            } else alert(data.erro);
        }
        carregar();
    </script>
</body>
</html>
