<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Agendamento - Salão</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Grade de Horários */
        .grade-horarios { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .botao-horario { padding: 10px; border: 1px solid #007BFF; background-color: #fff; color: #007BFF; cursor: pointer; text-align: center; border-radius: 4px; font-weight: bold; }
        .botao-horario:hover:not(:disabled) { background-color: #007BFF; color: white; }
        .botao-horario.selecionado { background-color: #0056b3; color: white; border-color: #0056b3; }
        
        /* Estilo para Horário Ocupado */
        .botao-horario:disabled { background-color: #e9ecef; color: #6c757d; border-color: #dee2e6; text-decoration: line-through; cursor: not-allowed; }
        
        button.confirmar { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; margin-top: 20px; border-radius: 4px; font-weight: bold; }
        button.confirmar:hover { background-color: #218838; }
        #mensagem { margin-top: 15px; padding: 10px; display: none; border-radius: 4px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>Agendamento de Horário</h2>
    
    <div class="campo">
        <label for="profissional">Profissional:</label>
        <select id="profissional" onchange="buscarHorariosOcupados()">
            <option value="">Selecione um profissional</option>
        </select>
    </div>

    <div class="campo">
        <label for="data">Data do Atendimento:</label>
        <input type="date" id="data" onchange="buscarHorariosOcupados()">
    </div>

    <div class="campo">
        <label>Horários Disponíveis:</label>
        <div id="grade_horarios" class="grade-horarios">
            </div>
    </div>

    <button class="confirmar" onclick="enviarAgendamento()">Confirmar Agendamento</button>
    <div id="mensagem"></div>

    <script>
        const API_BASE = 'http://localhost:5001';
        // Definição estrita dos blocos de horários da regra de negócio
        const horariosDefinidos = ["13:00:00", "14:00:00", "15:00:00"];
        let horarioSelecionado = null;

        document.addEventListener("DOMContentLoaded", function() {
            carregarProfissionais();
            configurarDataMinima();
        });

        function configurarDataMinima() {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('data').min = hoje;
        }

        function carregarProfissionais() {
            fetch(`${API_BASE}/profissionais`)
                .then(res => res.json())
                .then(dados => {
                    const select = document.getElementById('profissional');
                    dados.forEach(prof => {
                        const option = document.createElement('option');
                        option.value = prof.prof_id;
                        option.textContent = `${prof.prof_nome} (${prof.prof_especialidade})`;
                        select.appendChild(option);
                    });
                });
        }

        function buscarHorariosOcupados() {
            const profId = document.getElementById('profissional').value;
            const dataInput = document.getElementById('data').value;
            const grade = document.getElementById('grade_horarios');
            
            horarioSelecionado = null;
            grade.innerHTML = '';

            if (!profId || !dataInput) return;

            // Busca quais horários já estão no MySQL para este dia e profissional
            fetch(`${API_BASE}/horarios-ocupados?profissional_id=${profId}&data=${dataInput}`)
                .then(res => res.json())
                .then(ocupados => {
                    horariosDefinidos.forEach(hora => {
                        const botao = document.createElement('button');
                        botao.className = 'botao-horario';
                        botao.type = 'button';
                        botao.textContent = hora.substring(0, 5); // Mostra apenas "13:00"

                        // Se a hora retornada pelo banco coincidir, desabilita e risca
                        if (ocupados.includes(hora)) {
                            botao.disabled = true;
                        } else {
                            botao.onclick = function() {
                                document.querySelectorAll('.botao-horario').forEach(b => b.classList.remove('selecionado'));
                                botao.classList.add('selecionado');
                                horarioSelecionado = hora;
                            };
                        }
                        grade.appendChild(botao);
                    });
                });
        }

        function enviarAgendamento() {
            const profId = document.getElementById('profissional').value;
            const dataInput = document.getElementById('data').value;

            if (!profId || !dataInput || !horarioSelecionado) {
                exibirMensagem("Selecione o profissional, data e horário!", "#ffcccb", "#b30000");
                return;
            }

            const payload = {
                profissional_id: parseInt(profId),
                cliente_id: 1,
                data_hora: `${dataInput} ${horarioSelecionado}`
            };

            fetch(`${API_BASE}/agendar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(async response => {
                const dados = await response.json();
                if (response.status === 201) {
                    exibirMensagem(dados.mensagem, "#d4edda", "#155724");
                    buscarHorariosOcupados(); // Atualiza a grade para riscar o horário recém-criado
                } else {
                    exibirMensagem(dados.erro, "#fff3cd", "#856404");
                }
            });
        }

        function exibirMensagem(texto, fundo, corTexto) {
            const divMsg = document.getElementById('mensagem');
            divMsg.style.display = "block";
            divMsg.style.backgroundColor = fundo;
            divMsg.style.color = corTexto;
            divMsg.textContent = texto;
        }
    </script>
</body>
</html>
