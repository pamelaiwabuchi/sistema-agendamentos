version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: salao_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./script.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    image: pamelaiwabuchi/sistema-agendamento-salao:latest
    build: .
    container_name: salao_flask
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  mysql_data: